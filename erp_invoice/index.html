<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Invoice Generator</title>
    <!-- Link to CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>New Invoice</h1>
            <div class="form-group">
                <label>Invoice Number</label>
                <input type="text" value="INV-2023-001" readonly>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="invoiceDate">
            </div>
        </div>
        <div>
            <div class="form-group">
                <label>Customer</label>
                <select id="customerSelect">
                    <option value="Acme Corp">Acme Corp</option>
                    <option value="Globex Inc">Globex Inc</option>
                    <option value="Soylent Corp">Soylent Corp</option>
                </select>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="date" id="dueDate">
            </div>
        </div>
    </div>

    <table class="items-table">
        <thead>
            <tr>
                <th style="width: 40%">Description</th>
                <th style="width: 15%">Qty</th>
                <th style="width: 20%">Price</th>
                <th style="width: 15%">Tax %</th>
                <th style="width: 10%">Total</th>
                <th style="width: 5%"></th>
            </tr>
        </thead>
        <tbody id="lineItemsBody">
        </tbody>
    </table>

    <button class="btn btn-outline" onclick="addRow()">+ Add Line Item</button>

    <div class="totals-section">
        <div class="totals-box">
            <div class="total-row">
                <span>Subtotal</span>
                <span id="subtotalDisplay">$0.00</span>
            </div>
            <div class="total-row">
                <span>Tax</span>
                <span id="taxDisplay">$0.00</span>
            </div>
            <div class="total-row final">
                <span>Total</span>
                <span id="totalDisplay">$0.00</span>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" onclick="generateInvoice()">Save & Generate PDF</button>
    </div>
</div>

<!-- Link to JavaScript file -->
<script src="script.js"></script>
</body>
</html>
